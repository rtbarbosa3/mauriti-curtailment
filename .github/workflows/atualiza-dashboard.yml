name: Atualiza Dashboard Curtailment Mauriti

on:
  schedule:
    # Toda segunda-feira as 12:00 UTC = 09:00 BRT
    - cron: '0 12 * * 1'
  workflow_dispatch:  # permite rodar manualmente pela aba Actions
  push:
    branches: [main, master]
    paths:
      - 'gerar_dashboard_curtailment.py'
      - 'requirements.txt'
      - '.github/workflows/atualiza-dashboard.yml'

permissions:
  contents: write

concurrency:
  group: dashboard-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Instala dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restaura cache de dados ONS+CCEE
        uses: actions/cache@v4
        with:
          path: cache/
          key: ons-ccee-${{ github.run_id }}
          restore-keys: |
            ons-ccee-

      - name: Gera o dashboard
        run: python gerar_dashboard_curtailment.py

      - name: Verifica output
        run: |
          ls -la public/
          test -f public/index.html || (echo "ERRO: public/index.html nao foi gerado" && exit 1)
          echo "Tamanho do HTML: $(du -h public/index.html | cut -f1)"

      - name: Publica no GitHub Pages (branch gh-pages)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: |
            Atualiza dashboard - run #${{ github.run_number }}

            Trigger: ${{ github.event_name }}
            Sha: ${{ github.sha }}
