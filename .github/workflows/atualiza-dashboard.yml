name: Atualiza Dashboard Curtailment Mauriti

on:
  schedule:
    # Diariamente as 12:15 UTC = 09:15 BRT
    # Atrasamos 15 min em relacao ao horario anterior pra garantir que
    # o CCEE Dados Abertos ja publicou o PLD do dia anterior
    - cron: '15 12 * * *'
  workflow_dispatch:  # permite rodar manualmente pela aba Actions
  push:
    branches: [main, master]
    paths:
      - 'gerar_dashboard_curtailment.py'
      - 'enviar_email.py'
      - 'requirements.txt'
      - '.github/workflows/atualiza-dashboard.yml'

permissions:
  contents: write

concurrency:
  group: dashboard-deploy
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v5

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Instala dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restaura cache de dados ONS+CCEE
        uses: actions/cache@v4
        with:
          path: cache/
          key: ons-ccee-${{ github.run_id }}
          restore-keys: |
            ons-ccee-

      - name: Gera o dashboard
        run: python gerar_dashboard_curtailment.py

      - name: Verifica output
        run: |
          ls -la public/
          test -f public/index.html || (echo "ERRO: public/index.html nao foi gerado" && exit 1)
          test -f public/daily_summary.json || (echo "AVISO: daily_summary.json nao foi gerado")
          echo "Tamanho do HTML: $(du -h public/index.html | cut -f1)"

      - name: Publica no GitHub Pages (branch gh-pages)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: |
            Atualiza dashboard - run #${{ github.run_number }}

            Trigger: ${{ github.event_name }}
            Sha: ${{ github.sha }}

      - name: Commita pld_data atualizado de volta no main
        continue-on-error: true
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add pld_data/ || true
          if git diff --staged --quiet; then
            echo "pld_data sem mudancas, pulando commit"
          else
            git commit -m "auto-update PLD data (run #${{ github.run_number }})"
            git push
          fi

      - name: Envia email diario (opcional)
        if: success()
        continue-on-error: true
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
        run: |
          if [ -z "$GMAIL_USER" ] || [ -z "$GMAIL_APP_PASSWORD" ] || [ -z "$EMAIL_RECIPIENTS" ]; then
            echo "[!] Secrets de email nao configurados. Pulando envio."
            echo "    Pra ativar email diario, configure os GitHub Secrets:"
            echo "      GMAIL_USER, GMAIL_APP_PASSWORD, EMAIL_RECIPIENTS"
            exit 0
          fi
          python enviar_email.py
